{% extends "base.html" %}

{% block content %}
{% if error %}
<p class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700">{{ error }}</p>
{% endif %}

<form method="post" action="/login" class="space-y-4">
    {% if next %}
    <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <label class="block">
        <span class="mb-2 block text-sm font-semibold text-slate-700">Username или email</span>
        <input class="w-full rounded-full border border-slate-300 px-4 py-2 outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100" type="text" name="login" required minlength="3" maxlength="255">
    </label>
    <label class="block">
        <span class="mb-2 block text-sm font-semibold text-slate-700">Пароль</span>
        <input class="w-full rounded-full border border-slate-300 px-4 py-2 outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100" type="password" name="password" required>
    </label>
    <button class="rounded-full bg-sky-500 px-5 py-2 font-semibold text-white hover:bg-sky-600" type="submit">Войти</button>
</form>

<p class="mt-5 text-sm text-slate-600">Нет аккаунта? <a class="font-semibold text-sky-600 hover:underline" href="/register{% if next %}?next={{ next }}{% endif %}">Зарегистрироваться</a></p>
{% endblock %}
